services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    env_file:
      - .env
    restart: unless-stopped

  client:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - API_URL=http://server:3001
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: unless-stopped
